<!doctype html>
<!-- Friday's task: make this the live incident timeline + approve button that
     judges watch. For now it's a working placeholder that hits /pending and
     /approve so the loop is demoable from the browser. -->
<html><head><meta charset="utf-8"><title>Reflex</title>
<style>body{font-family:system-ui;max-width:640px;margin:3rem auto;color:#111}
button{padding:.6rem 1rem;margin-right:.5rem;cursor:pointer}</style></head>
<body>
  <h1>Reflex — on-call agent</h1>
  <pre id="pending">loading proposed action…</pre>
  <button onclick="decide(true)">Approve</button>
  <button onclick="decide(false)">Reject</button>
  <script>
    async function refresh(){
      const r = await fetch('/pending'); const d = await r.json();
      document.getElementById('pending').textContent =
        JSON.stringify(d.pending, null, 2) || 'no pending action';
    }
    async function decide(ok){
      await fetch('/approve?approved='+ok, {method:'POST'}); refresh();
    }
    setInterval(refresh, 2000); refresh();
  </script>
</body></html>
